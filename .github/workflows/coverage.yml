name: Coverage report

on:
    workflow_run:
        workflows:
            - Go quality checks
            - TypeScript quality checks
        types:
            - completed

permissions:
    contents: read
    pull-requests: write
    actions: read

jobs:
    coverage:
        runs-on: ubuntu-latest
        if: github.event.workflow_run.event == 'pull_request' && !startsWith(github.event.workflow_run.head_branch, 'release-please')
        steps:
            - uses: actions/checkout@v6

            - name: Download Go coverage
              uses: actions/download-artifact@v7
              continue-on-error: true
              with:
                  name: go-coverage
                  path: coverage/go
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  run-id: ${{ github.event.workflow_run.id }}

            - name: Download TypeScript coverage
              uses: actions/download-artifact@v7
              continue-on-error: true
              with:
                  name: coverage
                  path: coverage/ts
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  run-id: ${{ github.event.workflow_run.id }}

            - uses: xseman/coverage@v0.2.0
              with:
                  coverage-artifact-paths: |
                      go:coverage/go/coverage.out
                      bun:coverage/ts/lcov.info
