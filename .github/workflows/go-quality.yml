name: Go quality checks

on:
    push:
        branches: [master]
        paths:
            - "go/**"
            - ".github/workflows/go-quality.yml"
    pull_request:
        branches: [master]
        paths:
            - "go/**"
            - ".github/workflows/go-quality.yml"
    workflow_dispatch:
        inputs:
            pr_number:
                description: "PR number to run coverage for"
                required: false
                type: string

permissions:
    contents: read
    actions: write
    pull-requests: write

jobs:
    test:
        name: Test
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-go@v6
              with:
                  go-version: "stable"
                  cache-dependency-path: go/go.sum

            - name: Run tests with coverage
              working-directory: ./go
              run: make cover

            - name: Coverage report
              if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
              uses: xseman/coverage@v0.3.0
              with:
                  pull-request-number: ${{ github.event.inputs.pr_number }}
                  update-comment-marker: "<!-- coverage-reporter-go -->"
                  coverage-artifact-paths: |
                      go:go/coverage.out

    lint:
        name: Lint
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-go@v6
              with:
                  go-version: "stable"
                  cache-dependency-path: go/go.sum

            - name: golangci-lint
              uses: golangci/golangci-lint-action@v9
              with:
                  version: latest
                  working-directory: ./go

    build:
        name: Build
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-go@v6
              with:
                  go-version: "stable"
                  cache-dependency-path: go/go.sum

            - name: Build binaries
              working-directory: ./go
              run: |
                  make build
                  make build-ffi
